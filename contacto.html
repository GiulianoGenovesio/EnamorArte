<body>
  <header>
    <div>
      <img src="fotos/LOGO ENAMORARTE.png" alt="EnamorArte">
      <h1>EnamorARTE</h1>
    </div>
    <nav>
      <ul>
        <li><a href="index.html">Bienvenidos</a></li>
        <li><a href="nosotros.html">Nosotros</a></li>
        <li><a href="galeria.html">Galeria</a></li>
        <li><a href="contacto.html">Contacto</a></li>
      </ul>
    </nav>
  </header>
  <main>
    <section>
      <article class="contenedor-form">
        <h2>Completa el formulario</h2>

        <form action="" class="formulario">

          <div class="campo">
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" placeholder="Tu nombre">
          </div>

          <div class="campo">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Tu email">
          </div>

          <div class="campo">
            <label for="telefono">Teléfono</label>
            <input type="text" id="telefono" placeholder="Tu teléfono">
          </div>

          <!-- RADIO BUTTONS -->
          <div class="campo">
            <label>Tipo de consulta</label>
            <div class="opciones">
              <label class="opcion">
                <input type="radio" name="consulta" value="compra">
                Compra
              </label>
              <label class="opcion">
                <input type="radio" name="consulta" value="info">
                Información
              </label>
              <label class="opcion">
                <input type="radio" name="consulta" value="soporte">
                Soporte
              </label>
            </div>
          </div>

          <!-- CHECKBOX -->
          <div class="campo">
            <label>Preferencias</label>
            <div class="opciones">
              <label class="opcion">
                <input type="checkbox" value="novedades">
                Recibir novedades
              </label>
              <label class="opcion">
                <input type="checkbox" value="promos">
                Recibir promociones
              </label>
            </div>
          </div>

          <div class="campo">
            <label for="comentario">Comentario</label>
            <textarea id="comentario" placeholder="Escribí tu mensaje"></textarea>
          </div>

          <div class="campo">
            <input type="submit" value="Enviar" class="btn">
          </div>

        </form>
      </article>
      <article>
        <h2>Esta es nuestra dirección</h2>
        <iframe
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d13622.109422052017!2d-64.47902095103764!3d-31.399593523103512!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x942d673a598f91bf%3A0x67ff9a006a95b700!2sCARTEL%20VILLA%20CARLOS%20PAZ!5e0!3m2!1ses!2sar!4v1776635265283!5m2!1ses!2sar"
          width="300" height="300" style="border:0;" allowfullscreen="" loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"></iframe>
      </article>
    </section>
  </main>
  <section>
    <div class="redes-flotantes">
      <a href="https://wa.me/549XXXXXXXXXX" target="_blank" class="whatsapp">
        <i class="fab fa-whatsapp"></i>
      </a>

      <a href="https://instagram.com/EnamorARTE.vcp" target="_blank" class="instagram">
        <i class="fab fa-instagram"></i>
      </a>
    </div>
  </section>
